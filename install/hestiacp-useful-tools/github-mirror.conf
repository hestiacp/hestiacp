# Configuration for v-github-mirror
# Format: USER|REPO_URL|BRANCH|DESTINATION_PATH_RELATIVE_TO_HOME|RETENTION_MODE|RETENTION_COUNT

# Example 1: Mirror a public repo for user 'admin' (Standard Overwrite)
admin|https://github.com/your-org/repo.git|main|web/my-domain.com/private/TOOL-GITHUB-MIRROR|overwrite

# Example 2: Mirror a private repo for user 'client1' (Versioned, keep 5 copies)
client1|git@github.com:my-org/website-source.git|production|web/example.com/private/WEBSITE-GITHUB-MIRROR|versioned|5

# Example 3: Mirror with Smart Retention (Daily/Weekly/Monthly backups)
# Requires enabling ENABLE_DAILY_BACKUPS etc. in the script header
anotheruser|git@github.com:client-x/astro-project.git|master|web/client-x.com/private/ASTRO-GITHUB-MIRROR|backup
