# Configuration for v-prune-backups
# Place this file at /etc/hestiacp-backup-retention.conf

# Safety defaults: installed disabled and dry-run only.
RETENTION_ENABLED="FALSE"
RETENTION_DRY_RUN="TRUE"

# Native integration:
# When TRUE, the backup-core patch calls v-prune-backups automatically
# at the end of v-backup-users. Keep FALSE until dry-run output is reviewed.
RETENTION_AUTO_RUN="FALSE"
RETENTION_LOG_FILE="/usr/local/hestia/log/backup-retention.log"

# Backends to scan.
# Supported today:
# - local: /backup or another local/mounted path
# - b2: Hestia's native Backblaze B2 backup host
# - rclone: Hestia's native rclone backup host, which can point to many providers
RETENTION_BACKENDS="local,b2,rclone"

# Local backup root.
RETENTION_LOCAL_ROOT="/backup"

# GFS-style retention per user:
# - daily: keep the newest backup for each day inside this window
# - weekly: then keep the newest backup for each week
# - monthly: then keep the newest backup for each month
# - yearly: then keep the newest backup for each year
KEEP_DAILY_FOR_DAYS=14
KEEP_WEEKLY_FOR_WEEKS=8
KEEP_MONTHLY_FOR_MONTHS=12
KEEP_YEARLY_FOR_YEARS=0

# Week numbering uses GNU date ISO weeks by default.
RETENTION_WEEK_FORMAT="%G-W%V"

# Delete companion logs with the same base name when present.
RETENTION_DELETE_RELATED_LOGS="TRUE"
